# Rustfmt configuration for nwn1ee.types.rs
# See https://rust-lang.github.io/rustfmt/ for more options

# Basic formatting
edition = "2021"
max_width = 100

# Use field initialization shorthand
use_field_init_shorthand = true

# Control struct formatting
struct_field_align_threshold = 20
struct_lit_single_line = false
struct_lit_width = 18

# Function and method formatting
fn_params_layout = "Tall"

# Import formatting
imports_granularity = "Crate"
group_imports = "StdExternalCrate"

# Control comment formatting
comment_width = 80
wrap_comments = true
normalize_comments = true

# Control string formatting
format_strings = true
hex_literal_case = "Lower"

# Control macro formatting
format_macro_matchers = true
format_macro_bodies = true

# Control blank line preservation
blank_lines_upper_bound = 2

# Reorder imports and items
reorder_impl_items = true

# Control attribute formatting
normalize_doc_attributes = true

# Control trailing commas
trailing_comma = "Vertical"
trailing_semicolon = false

# Control chaining
chain_width = 60

# Control array formatting
array_width = 60
single_line_if_else_max_width = 50